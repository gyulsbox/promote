name: Release

# Manual-only. Trigger from the Actions tab → "Release" → "Run workflow".
#
# Typical flow:
#   1. Merge feature PRs to main as usual.
#   2. When ready to cut a release, dispatch this workflow.
#      release-please reads conventional commits since the last release and
#      opens / updates a "Release PR" that bumps version + CHANGELOG.
#   3. Review and merge the Release PR.
#   4. Dispatch this workflow again. release-please now sees the merge,
#      creates a tag + GitHub release, and the publish-npm job below fires.
#
# (Two dispatches are by design: one to prepare the release, one to publish.)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write  # required by npm provenance signing

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # Single-package mode (no monorepo). The action defaults to
          # release-please-config.json / .release-please-manifest.json — our
          # config file is dot-prefixed, so point at it explicitly.
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check + test + build (sanity before publish)
        run: |
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
