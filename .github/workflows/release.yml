name: Release

# Trigger: every push to main. release-please opens / updates a Release PR
# that bumps version and appends to CHANGELOG.md based on conventional commits
# since the last release. When that PR is merged, release-please creates a
# GitHub release + tag, which fans out to the publish job below.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write  # required by npm provenance signing

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # Single-package mode (no monorepo); reads .release-please-config.json
          # and .release-please-manifest.json from the repo root.
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check + test + build (sanity before publish)
        run: |
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
